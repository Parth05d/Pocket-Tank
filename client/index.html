<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pocket Tanks Clone</title>
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body>
    <div id="app">
      
      <!-- Lobby Screen -->
      <div id="lobby" class="screen active">
        <div class="glass-panel">
          <h1>Artillery Multiplayer</h1>
          
          <div class="input-group">
            <label>Nickname</label>
            <input type="text" id="nickname" placeholder="Player 1" />
          </div>
          
          <div class="actions">
            <button id="btn-create" class="btn primary">Create Multiplayer Game</button>
            <button id="btn-computer" class="btn secondary" style="margin-top: 10px;">Play vs Computer</button>
            <div class="divider"><span>OR</span></div>
            <div class="join-group">
              <input type="text" id="room-code" placeholder="Room Code (e.g. ABCD)" />
              <button id="btn-join" class="btn secondary">Join</button>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Waiting Room -->
      <div id="waiting-room" class="screen">
        <div class="glass-panel">
          <h2>Room: <span id="display-room-code"></span></h2>
          <div class="players-list" id="players-list"></div>
          <button id="btn-start" class="btn primary" style="display:none">Start Game</button>
        </div>
      </div>
      
      <!-- Game Screen -->
      <div id="game" class="screen">
        <div class="game-view-container">
          <!-- Top HUD -->
          <div id="classic-hud" class="classic-hud">
            <div class="hud-left">
              <div id="team-a-name" class="player-name team-a">PLAYER 1</div>
              <div id="team-a-score" class="player-score">0</div>
            </div>
            <div class="hud-center">
              <div id="turn-indicator" class="volley-text">Waiting...</div>
            </div>
            <div class="hud-right">
              <div id="team-b-name" class="player-name team-b">PLAYER 2</div>
              <div id="team-b-score" class="player-score">0</div>
            </div>
          </div>

          <canvas id="game-canvas" width="1920" height="1080"></canvas>
          
          <div id="game-over-modal" class="hidden">
            <h2 id="game-over-text"></h2>
            <button id="btn-lobby" class="btn primary">Back to Lobby</button>
          </div>
        </div>

        <div id="controls-container">
          <div id="controls" class="controls-panel disabled classic-panel">
            
            <div class="control-box move-box">
              <div class="label">Move</div>
              <div class="move-controls">
                <button class="tune-btn" id="btn-move-left">&lt;&lt;</button>
                <div class="value-box" id="moves-val">4</div>
                <button class="tune-btn" id="btn-move-right">&gt;&gt;</button>
              </div>
            </div>

            <div class="control-box weapon-box">
              <div class="label">Weapon</div>
              <div class="weapon-select-container">
                <select id="input-weapon" class="styled-select">
                  <option value="bomb">Standard Bomb</option>
                  <option value="napalm">Napalm</option>
                </select>
              </div>
            </div>

            <div class="control-box fire-box">
              <button id="btn-fire" class="btn danger fire-btn">FIRE</button>
            </div>

            <div class="control-box angle-box">
              <div class="label">Angle</div>
              <div class="angle-controls">
                <button class="tune-btn" id="btn-angle-minus">-</button>
                <div class="value-box" id="angle-val">45</div>
                <button class="tune-btn" id="btn-angle-plus">+</button>
                <input type="range" id="input-angle" min="0" max="180" value="45" style="display:none;" />
              </div>
            </div>

            <div class="control-box power-box">
              <div class="power-bar-container">
                <input type="range" id="input-power" min="10" max="150" value="50" class="classic-slider" />
              </div>
              <div class="power-readout">
                <div class="label">Power</div>
                <div class="power-controls">
                  <button class="tune-btn" id="btn-power-minus">-</button>
                  <div class="value-box" id="power-val">50</div>
                  <button class="tune-btn" id="btn-power-plus">+</button>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
      
    </div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
